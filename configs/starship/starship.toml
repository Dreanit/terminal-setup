"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$java\
$docker_context\
$cmd_duration\
$line_break\
$character"""

add_newline = true

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[directory]
style = "bold mauve"
format = '[$path]($style) '
truncation_length = 3
truncation_symbol = ".../"

[git_branch]
symbol = ""
style = "green"
format = '[$symbol $branch]($style) '

[git_status]
style = "red"
format = '[$all_status$ahead_behind]($style) '

[python]
symbol = ""
style = "yellow"
format = '[$symbol $version]($style) '

[nodejs]
symbol = ""
style = "green"
format = '[$symbol $version]($style) '

[rust]
symbol = ""
style = "peach"
format = '[$symbol $version]($style) '

[golang]
symbol = ""
style = "sky"
format = '[$symbol $version]($style) '

[java]
symbol = ""
style = "red"
format = '[$symbol $version]($style) '

[docker_context]
symbol = ""
style = "blue"
format = '[$symbol $context]($style) '

[cmd_duration]
min_time = 500
style = "surface2"
format = '[$duration]($style) '

[character]
success_symbol = '[>](bold lavender)'
error_symbol = '[>](bold red)'

[line_break]
disabled = false
